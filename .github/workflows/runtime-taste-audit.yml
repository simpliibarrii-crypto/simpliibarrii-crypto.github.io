name: Runtime and Taste Audit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install browser runtime
        run: |
          node --check app.js
          node --check brand-contract.js
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Serve and exercise every public surface
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > portfolio-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          READY=0
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then READY=1; break; fi
            sleep 1
          done
          test "$READY" = 1 || { cat portfolio-server.log; exit 1; }
          node <<'JS'
          const { chromium } = require('playwright');
          const ids = ['home-for-ai','raven-ai','openclinical-ai','hermes-edge','raven-biocomputer','jspace-chain','langchain-nvidia'];
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const errors = [];
            const open = async (path, name, viewport = { width: 1440, height: 1000 }) => {
              const context = await browser.newContext({ viewport });
              const page = await context.newPage();
              page.on('console', message => { if (message.type() === 'error') errors.push(`${name}: ${message.text()}`); });
              page.on('pageerror', error => errors.push(`${name}: ${error.message}`));
              await page.goto(`http://127.0.0.1:4173/${path}`, { waitUntil: 'networkidle' });
              return { page, context };
            };

            const homeSurface = await open('', 'home');
            const home = homeSurface.page;
            if (await home.locator('.project-card').count() !== 7) throw new Error('Homepage must expose seven project cards.');
            await home.screenshot({ path: 'portfolio-home-desktop.png', fullPage: true });
            await homeSurface.context.close();

            const mobileSurface = await open('', 'home-mobile', { width: 390, height: 844 });
            const mobile = mobileSurface.page;
            const menu = mobile.locator('.menu-toggle');
            await menu.waitFor({ state: 'visible' });
            await menu.click();
            if ((await menu.getAttribute('aria-expanded')) !== 'true') throw new Error('Mobile navigation did not open accessibly.');
            await mobile.screenshot({ path: 'portfolio-home-mobile.png', fullPage: true });
            await mobileSurface.context.close();

            const researchSurface = await open('research.html', 'research');
            const research = researchSurface.page;
            if ((await research.locator('.research-card').count()) < 6) throw new Error('Research archive is missing entries.');
            await research.screenshot({ path: 'portfolio-research.png', fullPage: true });
            await researchSurface.context.close();

            for (const id of ids) {
              const surface = await open(`project.html?project=${id}`, id);
              const page = surface.page;
              await page.locator('#run-demo').waitFor({ state: 'visible' });
              await page.locator('#run-demo').click();
              const output = (await page.locator('#demo-output').textContent() || '').trim();
              if (!output || output === '{}') throw new Error(`${id}: demo produced no output`);
              const title = (await page.locator('#project-title').textContent() || '').trim();
              if (!title) throw new Error(`${id}: project title missing`);
              if (id === 'home-for-ai' || id === 'openclinical-ai') {
                await page.screenshot({ path: `portfolio-${id}.png`, fullPage: true });
              }
              await surface.context.close();
            }

            const notFoundSurface = await open('404.html', '404');
            if (!(await notFoundSurface.page.locator('body').innerText()).includes('404')) throw new Error('Branded 404 page is missing its status.');
            await notFoundSurface.context.close();

            await browser.close();
            if (errors.length) throw new Error(`Browser errors:\n${errors.join('\n')}`);
          })();
          JS
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portfolio-visual-smoke
          path: |
            portfolio-*.png
            portfolio-server.log

  taste-accessibility-and-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate markup, local links, brand, and maturity language
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse

          html_files = list(Path('.').glob('*.html'))
          assert html_files
          local_targets = {path.name for path in html_files} | {'styles.css', 'app.js', 'brand-contract.js', 'sitemap.xml', 'robots.txt'}

          class AuditParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
                  self.links = []
                  self.images_without_alt = []
                  self.scripts = []
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if 'id' in attrs: self.ids.append(attrs['id'])
                  if tag == 'a' and 'href' in attrs: self.links.append(attrs['href'])
                  if tag == 'script' and 'src' in attrs: self.scripts.append(attrs['src'])
                  if tag == 'img' and not attrs.get('alt'): self.images_without_alt.append(attrs.get('src', '<unknown>'))

          html_text = ''
          for path in html_files:
              text = path.read_text(encoding='utf-8')
              html_text += text.lower()
              parser = AuditParser()
              parser.feed(text)
              assert len(parser.ids) == len(set(parser.ids)), f'{path}: duplicate IDs'
              assert not parser.images_without_alt, f'{path}: images missing alt text: {parser.images_without_alt}'
              for href in parser.links + parser.scripts:
                  if href.startswith(('#', 'mailto:', 'tel:', 'http://', 'https://')): continue
                  target = (urlparse(href).path or path.name).lstrip('/')
                  if target: assert Path(target).exists() or target in local_targets, f'{path}: broken local resource {href}'

          css = Path('styles.css').read_text(encoding='utf-8').lower()
          app_js = Path('app.js').read_text(encoding='utf-8').lower()
          brand_js = Path('brand-contract.js').read_text(encoding='utf-8').lower()
          combined = css + app_js + brand_js + html_text
          for token in ('#050505', '#c8273f', '#c9ad7d', '#f4efe7'):
              assert token in combined, f'missing canonical brand token {token}'
          assert 'prefers-reduced-motion' in css
          assert 'aria-expanded' in combined
          canonical = ['active product', 'active research platform', 'development-preview mvp', 'alpha research software', 'private research prototype', 'attributed integration study']
          for label in canonical:
              assert label in combined, f'missing canonical maturity label {label}'
          assert 'barry-ai-public.simpliibarrii.chatgpt.site' not in combined
          assert all('brand-contract.js' in p.read_text(encoding='utf-8') for p in html_files), 'not every public page loads the brand contract'
          print('Portfolio taste, accessibility, and link contract passed.')
          PY
